  <text x="740" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">mcp</text>
  <text x="740" y="175" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• MCP server</text>
  <text x="740" y="190" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• AI integration</text>
  <text x="740" y="205" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Kiro CLI</text>
  
  <!-- AI Agent Section -->
