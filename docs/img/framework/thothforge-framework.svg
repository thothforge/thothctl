  <text x="140" y="567" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">upgrade</text>
  <text x="140" y="585" text-anchor="middle" fill="#fecaca" font-family="Arial, sans-serif" font-size="11">• Self-update • Version management</text>
  
  <!-- Supported Tools Section -->
  <text x="50" y="630" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Supported Tools and Integrations</text>
  
  <!-- Infrastructure Tools -->
  <rect x="50" y="648" width="250" height="50" fill="#0891b2" rx="8"/>
  <text x="175" y="666" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Infrastructure</text>
  <text x="175" y="684" text-anchor="middle" fill="#cffafe" font-family="Arial, sans-serif" font-size="10">Terraform • Terragrunt • OpenTofu • CDK v2</text>
  
  <!-- Security Tools -->
  <rect x="315" y="648" width="250" height="50" fill="#0891b2" rx="8"/>
  <text x="440" y="666" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Security and Compliance</text>
  <text x="440" y="684" text-anchor="middle" fill="#cffafe" font-family="Arial, sans-serif" font-size="10">Checkov • Trivy • TFSec • KICS • Snyk</text>
  
  <!-- AI and Development Tools -->
  <rect x="580" y="648" width="250" height="50" fill="#0891b2" rx="8"/>
  <text x="705" y="666" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">AI Providers</text>
  <text x="705" y="684" text-anchor="middle" fill="#cffafe" font-family="Arial, sans-serif" font-size="10">OpenAI • Bedrock • Bedrock Agent • Azure • Ollama</text>
  
  <!-- Key Features Section -->
  <text x="50" y="730" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Key Features</text>
  
  <!-- Feature Badges -->
