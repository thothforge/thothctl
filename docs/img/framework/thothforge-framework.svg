  <text x="585" y="435" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">list</text>
  <text x="585" y="455" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Resource listing</text>
  <text x="585" y="470" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Discovery</text>
  <text x="585" y="485" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Inventory view</text>
  
