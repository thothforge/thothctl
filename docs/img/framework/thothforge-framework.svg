<svg width="900" height="780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cmdGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="780" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="900" height="80" fill="url(#headerGrad)"/>
  <text x="450" y="30" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="24" font-weight="bold">ThothForge Framework</text>
  <text x="450" y="55" text-anchor="middle" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="14">Open Source Internal Developer Platform CLI</text>
  
  <!-- Core Commands Section -->
  <text x="50" y="110" fill="#1f2937" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Core Commands</text>
  
  <!-- Init Command -->
  <rect x="50" y="130" width="140" height="80" fill="url(#cmdGrad)" rx="8"/>
  <text x="120" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">init</text>
  <text x="120" y="175" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Environment setup</text>
  <text x="120" y="190" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Tool installation</text>
  <text x="120" y="205" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Project bootstrap</text>
  
  <!-- Check Command -->
  <rect x="205" y="130" width="140" height="80" fill="url(#cmdGrad)" rx="8"/>
  <text x="275" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">check</text>
  <text x="275" y="175" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Environment validation</text>
  <text x="275" y="190" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Cost analysis</text>
  <text x="275" y="205" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Blast radius</text>
  
  <!-- Scan Command -->
  <rect x="360" y="130" width="140" height="80" fill="url(#cmdGrad)" rx="8"/>
  <text x="430" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">scan</text>
  <text x="430" y="175" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Security scanning</text>
  <text x="430" y="190" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Code analysis</text>
  <text x="430" y="205" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Compliance</text>
  
  <!-- Document Command -->
  <rect x="515" y="130" width="140" height="80" fill="url(#cmdGrad)" rx="8"/>
  <text x="585" y="155" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">document</text>
  <text x="585" y="175" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Auto documentation</text>
  <text x="585" y="190" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• AI generation</text>
  <text x="585" y="205" text-anchor="middle" fill="#dcfce7" font-family="Arial, sans-serif" font-size="11">• Templates</text>
  
