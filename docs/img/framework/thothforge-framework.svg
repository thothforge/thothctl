  <text x="740" y="435" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">remove</text>
  <text x="740" y="455" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Project cleanup</text>
  <text x="740" y="470" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Space removal</text>
  <text x="740" y="485" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Resource cleanup</text>
  
  <!-- Utility Commands Section -->
