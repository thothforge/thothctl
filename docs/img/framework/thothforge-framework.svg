  <text x="120" y="435" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">project</text>
  <text x="120" y="455" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Project lifecycle</text>
  <text x="120" y="470" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Configuration</text>
  <text x="120" y="485" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Templates</text>
  
