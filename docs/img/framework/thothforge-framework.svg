  <text x="127" y="760" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">🔒 DevSecOps SDLC</text>
  
  <rect x="215" y="742" width="155" height="28" fill="#10b981" rx="6"/>
  <text x="292" y="760" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">🤖 AI Agent (Multi)</text>
  
  <rect x="380" y="742" width="155" height="28" fill="#10b981" rx="6"/>
  <text x="457" y="760" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">💰 AWS Cost Analysis</text>
  
  <rect x="545" y="742" width="155" height="28" fill="#10b981" rx="6"/>
  <text x="622" y="760" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">💥 Blast Radius</text>
  
  <rect x="710" y="742" width="155" height="28" fill="#10b981" rx="6"/>
  <text x="787" y="760" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="11" font-weight="bold">🔌 MCP + REST API</text>
</svg>
