  <text x="275" y="435" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">inventory</text>
  <text x="275" y="455" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Resource tracking</text>
  <text x="275" y="470" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Version control</text>
  <text x="275" y="485" text-anchor="middle" fill="#e9d5ff" font-family="Arial, sans-serif" font-size="11">• Dependencies</text>
  
