  <text x="100" y="315" fill="#fef3c7" font-family="Arial, sans-serif" font-size="11">Multi-agent orchestrator for IaC security analysis, code review, and PR decisions</text>
  
  <!-- AI Sub-features -->
  <rect x="60" y="330" width="110" height="16" fill="#fbbf24" rx="4"/>
  <text x="115" y="342" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="9" font-weight="bold">analyze</text>
  
  <rect x="178" y="330" width="110" height="16" fill="#fbbf24" rx="4"/>
  <text x="233" y="342" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="9" font-weight="bold">orchestrate</text>
  
  <rect x="296" y="330" width="110" height="16" fill="#fbbf24" rx="4"/>
  <text x="351" y="342" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="9" font-weight="bold">decide</text>
  
  <rect x="414" y="330" width="110" height="16" fill="#fbbf24" rx="4"/>
  <text x="469" y="342" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="9" font-weight="bold">improve</text>
  
  <rect x="532" y="330" width="110" height="16" fill="#fbbf24" rx="4"/>
  <text x="587" y="342" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="9" font-weight="bold">apply-fix</text>
  
  <rect x="650" y="330" width="110" height="16" fill="#fbbf24" rx="4"/>
  <text x="705" y="342" text-anchor="middle" fill="#78350f" font-family="Arial, sans-serif" font-size="9" font-weight="bold">serve (REST API)</text>
  
